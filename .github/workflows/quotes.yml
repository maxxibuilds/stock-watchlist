name: refresh quotes
on:
  schedule:
    - cron: "5 13-20 * * 1-5"   # 每小时一次“保险启动/重启”（GitHub 定时不可靠，仅作兜底）
  workflow_dispatch: {}          # 手动启动循环
permissions:
  contents: write
concurrency:
  group: quotes
  cancel-in-progress: true       # 新的启动会接管旧循环，避免重叠
jobs:
  loop:
    runs-on: ubuntu-latest
    timeout-minutes: 340         # 单次最长约 5.5 小时（GitHub 上限 6h）
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: 常驻循环抓报价（约每10分钟一次，直到收盘 UTC 21:00）
        env:
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for i in $(seq 1 33); do
            H=$(date -u +%H)
            if [ "$H" -ge 21 ]; then echo "盘后，退出循环"; break; fi
            node scripts/fetch-quotes.mjs || true
            git add data/quotes.json
            if ! git diff --staged --quiet; then
              git commit -m "chore: quotes [skip ci]"
              git pull --rebase --autostash origin main || true
              git push || { sleep 5; git pull --rebase --autostash origin main || true; git push || true; }
            fi
            echo "tick $i 完成 @ $(date -u +%H:%M) UTC"
            sleep 300
          done
