name: refresh market data
on:
  schedule:
    - cron: "20 22 * * 1-5"   # 美东收盘后（约 UTC 22:20，周一到周五）
  workflow_dispatch: {}        # 也可手动触发（改了 universe/脚本后手动跑一次即可）
permissions:
  contents: write
concurrency:
  group: refresh
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Fetch market data
        run: node scripts/fetch-market.mjs
        env:
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/market.json
          if git diff --staged --quiet; then
            echo "no change"
          else
            git commit -m "chore: refresh market data [skip ci]"
            git push
          fi
