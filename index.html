<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Max Builds</title>
<style>
  :root{
    --bg:radial-gradient(1100px 700px at 12% -8%,rgba(76,141,255,.16),transparent 60%),radial-gradient(900px 600px at 96% 4%,rgba(39,215,150,.10),transparent 55%),radial-gradient(900px 800px at 60% 120%,rgba(120,80,255,.10),transparent 60%),linear-gradient(180deg,#0a0e1a,#0b1020 40%,#080b14);
    --card:rgba(22,30,48,.66); --card-bd:rgba(120,140,180,.14); --txt:#e8edf6; --txt-dim:#8a96ad; --line:rgba(120,140,180,.10);
    --green:#27d796; --red:#ff5a6a; --flat:#8a96ad; --accent:#4c8dff; --warn:#ffb454; --surf:rgba(255,255,255,.06); --hover:rgba(255,255,255,.05);
    --mono:'SF Mono','JetBrains Mono','Consolas','Roboto Mono',ui-monospace,monospace;
  }
  *{box-sizing:border-box} html,body{margin:0;height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;color:var(--txt);min-height:100%;background:var(--bg);background-attachment:fixed}
  header{position:sticky;top:0;z-index:30;backdrop-filter:blur(14px);background:linear-gradient(180deg,rgba(10,14,26,.85),rgba(10,14,26,.6));border-bottom:1px solid var(--line)}
  .hrow{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:12px 22px;max-width:1360px;margin:0 auto}
  .brand{display:flex;align-items:center;gap:9px;font-weight:700;font-size:17px;white-space:nowrap;letter-spacing:.3px}
  .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--flat)}
  .brand .dot.ok{background:var(--green);box-shadow:0 0 12px var(--green)}
  .brand .dot.err{background:var(--red);box-shadow:0 0 12px var(--red)}
  .idx{display:flex;gap:8px;flex-wrap:wrap}
  .idx .chip{display:flex;align-items:center;gap:7px;background:var(--surf);border:1px solid var(--card-bd);border-radius:9px;padding:5px 10px;font-size:12.5px}
  .idx .chip .nm{color:var(--txt-dim)} .idx .chip .v{font-family:var(--mono);font-weight:600}
  .spacer{flex:1} .upd{font-size:12px;color:var(--txt-dim);font-variant-numeric:tabular-nums}
  .upd.stale{color:#e6a23c;font-weight:600}
  .tabwrap{max-width:1360px;margin:0 auto;padding:6px 14px 2px}
  .tabs{display:flex;flex-direction:column;gap:3px}
  .tabgroup{display:flex;align-items:center;flex-wrap:wrap;gap:4px}
  .glabel{font-size:11px;color:var(--txt-dim);min-width:50px;flex-shrink:0;letter-spacing:.5px;font-weight:700}
  .tab{display:inline-flex;align-items:center;gap:7px;cursor:pointer;padding:10px 15px;border:none;background:transparent;color:var(--txt-dim);font-size:14px;font-weight:600;border-bottom:2.5px solid transparent;border-radius:8px 8px 0 0}
  .tab:hover{color:var(--txt);background:var(--hover)} .tab.on{color:var(--txt);border-bottom-color:var(--accent)}
  .tab .cnt{font-size:11px;color:var(--txt-dim);background:rgba(120,140,180,.14);padding:1px 7px;border-radius:20px;font-weight:600}
  .tab.on .cnt{background:rgba(76,141,255,.25);color:#cfe0ff}
  main{max-width:1360px;margin:0 auto;padding:18px 18px 80px}
  .summary{display:flex;align-items:center;gap:18px;flex-wrap:wrap;margin:0 6px 14px;padding:14px 18px;background:var(--card);border:1px solid var(--card-bd);border-radius:14px;backdrop-filter:blur(8px)}
  .summary .big{font-size:20px;font-weight:700}
  .summary .kv{display:flex;flex-direction:column;gap:2px}
  .summary .kv .k{font-size:11px;color:var(--txt-dim);letter-spacing:.4px}
  .summary .kv .v{font-size:15px;font-weight:600;font-family:var(--mono)}
  .tablecard{margin:0 4px;background:var(--card);border:1px solid var(--card-bd);border-radius:16px;overflow:hidden;backdrop-filter:blur(8px)}
  .filterbar{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--line);flex-wrap:wrap}
  .filterbar input{background:var(--surf);border:1px solid var(--card-bd);color:var(--txt);padding:8px 12px;border-radius:9px;font-size:13px;width:220px}
  .filterbar input:focus{outline:none;border-color:var(--accent)}
  .chips{display:flex;gap:4px}
  .chip{cursor:pointer;border:1px solid var(--card-bd);background:var(--surf);color:var(--txt-dim);padding:6px 13px;border-radius:8px;font-size:12.5px}
  .chip:hover{color:var(--txt)} .chip.on{background:var(--accent);border-color:transparent;color:#fff;font-weight:600}
  .filterbar .muted{margin-left:auto;color:var(--txt-dim);font-size:12px}
  .tablescroll{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:14px;min-width:820px}
  thead th{text-align:right;font-weight:600;font-size:11.5px;letter-spacing:.4px;color:var(--txt-dim);text-transform:uppercase;padding:11px 14px;cursor:pointer;white-space:nowrap;user-select:none;border-bottom:1px solid var(--line);background:var(--surf)}
  thead th:first-child,tbody td:first-child{text-align:left} thead th.l,tbody td.l{text-align:left} thead th.c,tbody td.c{text-align:center}
  thead th.nos{cursor:default} thead th:not(.nos):hover{color:var(--txt)} thead th .ar{opacity:.6;font-size:10px;margin-left:3px}
  tbody td{padding:11px 14px;text-align:right;border-bottom:1px solid var(--line);font-variant-numeric:tabular-nums;white-space:nowrap}
  tbody tr:last-child td{border-bottom:none} tbody tr:hover{background:var(--hover)}
  .sym{font-weight:700;font-family:var(--mono);font-size:14px}
  td.name{color:var(--txt-dim);max-width:190px;overflow:hidden;text-overflow:ellipsis;font-size:13px}
  .spark{display:block;margin:0 auto}
  .num{font-family:var(--mono)} .pos{color:var(--green)} .neg{color:var(--red)} .flat{color:var(--flat)}
  .pill{display:inline-block;min-width:64px;padding:3px 9px;border-radius:7px;font-family:var(--mono);font-size:13px;font-weight:600}
  .pill.pos{background:color-mix(in srgb,var(--green) 16%,transparent)} .pill.neg{background:color-mix(in srgb,var(--red) 16%,transparent)} .pill.flat{background:rgba(138,150,173,.12)}
  .legend{display:none}
</style>
</head>
<body>
<header>
  <div class="hrow">
    <div class="brand"><span class="dot" id="dot"></span>Max Builds</div>
    <div class="idx" id="idx"></div>
    <div class="spacer"></div>
    <span class="upd" id="updated"></span>
  </div>
  <div class="tabwrap"><div class="tabs" id="tabs"></div></div>
</header>
<main>
  <div class="summary" id="summary" style="display:none"></div>
  <div class="tablecard">
    <div class="filterbar">
      <input id="filterInput" placeholder="🔍 筛选代码 / 名称…" autocomplete="off">
      <div class="chips"><button class="chip on" data-dir="all">全部</button><button class="chip" data-dir="up">上涨</button><button class="chip" data-dir="down">下跌</button></div>
      <span class="muted" id="filterCount"></span>
    </div>
    <div class="tablescroll"><table id="table"></table></div>
  </div>
</main>
<script>
"use strict";
/* 全云端：网页只读 3 个静态文件，不调用任何 API、不需要 key。
   universe.json=板块/中文名  market.json=趋势/涨跌幅/PE/名称  quotes.json=实时价格(服务器每~10分钟刷) */
const LS={state:"sbx_state_v5"};
const INDICES=["SPY","QQQ","DIA"];
const IDXCN={SPY:"标普500",QQQ:"纳指100",DIA:"道指"};
let UNI={cn:{},sectors:[]}, CN={}, MKT={}, QUO={}, QIDX={}, QTS=0;
let state=loadState(), sortBy={}, filter={q:"",dir:"all"};
let poll=null;

function loadState(){ let s=null; try{s=JSON.parse(localStorage.getItem(LS.state));}catch(e){} if(!s)s={}; if(!s.activeId)s.activeId="mega"; if(!Array.isArray(s.sectors))s.sectors=[]; return s; }
function saveState(){ localStorage.setItem(LS.state,JSON.stringify(state)); }
const $=(s,r=document)=>r.querySelector(s);
const todayStr=()=>{const d=new Date();return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();};
function activeSector(){ return state.sectors.find(x=>x.id===state.activeId)||state.sectors[0]||{id:"_",name:"—",syms:[]}; }
const fmtPct=v=>v==null||isNaN(v)?"—":(v>=0?"+":"")+v.toFixed(2)+"%";
const fmtPrice=v=>v==null||isNaN(v)||v===0?"—":v.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtPE=v=>v==null||isNaN(v)?"—":v<0?"亏损":(+v).toFixed(1);
const sgn=v=>v==null||isNaN(v)||v===0?"flat":v>0?"pos":"neg";
const esc=s=>String(s).replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]));
function dispName(s){ return CN[s]||(MKT[s]&&MKT[s].n)||""; }
function fmtDT(ts){ if(!ts)return"—"; const d=new Date(ts),p=n=>String(n).padStart(2,"0");
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`; }

/* ---------- 美股时段判断（按美东时区算，自动适应夏令时） ----------
   休市日历硬编码到 2027；过期后最多在休市日误显示"延迟"，不影响数据本身 */
const MKT_HOLIDAYS=new Set(["2026-01-01","2026-01-19","2026-02-16","2026-04-03","2026-05-25","2026-06-19","2026-07-03","2026-09-07","2026-11-26","2026-12-25",
 "2027-01-01","2027-01-18","2027-02-15","2027-03-26","2027-05-31","2027-06-18","2027-07-05","2027-09-06","2027-11-25","2027-12-24"]);
const MKT_HALF=new Set(["2026-11-27","2026-12-24","2027-11-26"]); // 半日市，13:00 提前收盘
function etNow(){ const parts=new Intl.DateTimeFormat("en-US",{timeZone:"America/New_York",year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit",hourCycle:"h23",weekday:"short"}).formatToParts(new Date());
  const g=t=>parts.find(x=>x.type===t).value;
  return {date:`${g("year")}-${g("month")}-${g("day")}`, mins:+g("hour")*60+ +g("minute"), wd:g("weekday")}; }
function marketOpen(){ const e=etNow();
  if(e.wd==="Sat"||e.wd==="Sun"||MKT_HOLIDAYS.has(e.date)) return false;
  const close=MKT_HALF.has(e.date)?13*60:16*60;
  return e.mins>=9*60+30 && e.mins<close; }

/* ---------- 数据 ---------- */
async function loadStatic(){
  const bust="?d="+todayStr();
  const [u,m]=await Promise.all([
    fetch("data/universe.json"+bust).then(r=>r.json()).catch(()=>null),
    fetch("data/market.json"+bust).then(r=>r.json()).catch(()=>null),
  ]);
  if(u){ UNI=u; CN=u.cn||{}; if(!state.sectors.length||state.uniVer!==u.ver){ state.sectors=JSON.parse(JSON.stringify(u.sectors)); state.uniVer=u.ver; if(!state.sectors.find(x=>x.id===state.activeId))state.activeId=state.sectors[0].id; saveState(); } }
  if(m){ MKT=m.data||{}; }
}
async function loadQuotes(){
  try{ const q=await fetch("data/quotes.json?t="+Date.now()).then(r=>r.json());
    QUO=q.data||{}; QIDX=q.idx||{}; QTS=q.ts||0; setDot("ok"); }
  catch(e){ setDot("err"); }
  renderIndices(); renderSummary(); renderTable(); renderUpdated();
}

/* ---------- 趋势图 ---------- */
function sparkSVG(c){
  if(!c||c.length<2) return '<span class="flat" style="font-family:var(--mono)">···</span>';
  const w=92,h=26,mn=Math.min(...c),mx=Math.max(...c),rg=(mx-mn)||1;
  const pts=c.map((v,i)=>((i/(c.length-1))*(w-2)+1).toFixed(1)+","+(h-2-((v-mn)/rg)*(h-4)).toFixed(1)).join(" ");
  const col=c[c.length-1]>=c[0]?"var(--green)":"var(--red)";
  return `<svg class="spark" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><polyline points="${pts}" fill="none" stroke="${col}" stroke-width="1.5" stroke-linejoin="round"/></svg>`;
}

/* ---------- 渲染 ---------- */
const COLS=[{k:"sym",t:"代码",l:1,sort:1},{k:"name",t:"名称",l:1,nos:1},{k:"spark",t:"趋势",c:1,nos:1},
 {k:"price",t:"价格",sort:1},{k:"today",t:"今日",sort:1},{k:"mtd",t:"本月",sort:1},{k:"q3m",t:"近90天",sort:1},{k:"ytd",t:"YTD",sort:1},{k:"pe",t:"PE",sort:1}];
function price(s){ return (QUO[s]||{}).p; }
function today(s){ return (QUO[s]||{}).d; }
function ret(s,k){ return MKT[s]?MKT[s][k]:null; }
function peOf(s){ return MKT[s]?MKT[s].pe:null; }
function rowVal(s,k){ if(k==="sym")return s; if(k==="price")return price(s); if(k==="today")return today(s); if(k==="pe")return peOf(s); return ret(s,k); }
function visibleSyms(sec){
  let a=sec.syms.slice();
  if(filter.q){ const q=filter.q.toUpperCase(); a=a.filter(s=>s.includes(q)||dispName(s).toUpperCase().includes(q)); }
  if(filter.dir!=="all"){ a=a.filter(s=>{ const t=today(s); if(t==null||isNaN(t))return false; return filter.dir==="up"?t>0:t<0; }); }
  const sb=sortBy[sec.id];
  if(sb&&sb.key){ a.sort((x,y)=>{ let vx=rowVal(x,sb.key),vy=rowVal(y,sb.key);
    if(sb.key==="sym")return sb.dir*String(vx).localeCompare(String(vy));
    const nx=(vx==null||isNaN(vx)),ny=(vy==null||isNaN(vy)); if(nx&&ny)return 0; if(nx)return 1; if(ny)return -1; return sb.dir*(vx-vy); }); }
  return a;
}
function renderTabs(){
  const box=$("#tabs"); box.innerHTML="";
  let groups=(UNI.groups&&UNI.groups.length)?UNI.groups.map(g=>({name:g.name,ids:g.ids.slice()})):[{name:"",ids:state.sectors.map(s=>s.id)}];
  const grouped=new Set(groups.flatMap(g=>g.ids));
  const rest=state.sectors.filter(s=>!grouped.has(s.id)).map(s=>s.id);
  if(rest.length) groups.push({name:"其他",ids:rest});
  groups.forEach(g=>{
    const row=document.createElement("div"); row.className="tabgroup";
    if(g.name) row.insertAdjacentHTML("beforeend",`<span class="glabel">${esc(g.name)}</span>`);
    g.ids.forEach(id=>{ const sec=state.sectors.find(x=>x.id===id); if(!sec)return;
      const b=document.createElement("button"); b.className="tab"+(sec.id===state.activeId?" on":"");
      b.innerHTML=`${esc(sec.name)} <span class="cnt">${sec.syms.length}</span>`;
      b.onclick=()=>{ state.activeId=sec.id; saveState(); renderTabs(); renderSummary(); renderTable(); };
      row.appendChild(b); });
    box.appendChild(row);
  });
}
function renderIndices(){ const box=$("#idx"); box.innerHTML="";
  INDICES.forEach(s=>{ const d=(QIDX[s]||{}).d; box.insertAdjacentHTML("beforeend",`<div class="chip"><span class="nm">${IDXCN[s]}</span><span class="v ${sgn(d)}">${fmtPct(d)}</span></div>`); }); }
function renderSummary(){
  const sec=activeSector(),el=$("#summary");
  const vals=sec.syms.map(today).filter(v=>v!=null&&!isNaN(v));
  if(!vals.length){ el.style.display="none"; return; } el.style.display="flex";
  const up=vals.filter(v=>v>0).length,down=vals.filter(v=>v<0).length,avg=vals.reduce((a,b)=>a+b,0)/vals.length;
  let best=null,worst=null; sec.syms.forEach(s=>{const v=today(s);if(v==null||isNaN(v))return;if(!best||v>best.v)best={s,v};if(!worst||v<worst.v)worst={s,v};});
  el.innerHTML=`<div class="big">${esc(sec.name)}</div>`+
    `<div class="kv"><span class="k">今日</span><span class="v"><span class="pos">${up}涨</span> / <span class="neg">${down}跌</span></span></div>`+
    `<div class="kv"><span class="k">板块均涨幅</span><span class="v ${sgn(avg)}">${fmtPct(avg)}</span></div>`+
    (best?`<div class="kv"><span class="k">领涨</span><span class="v ${sgn(best.v)}">${best.s} ${fmtPct(best.v)}</span></div>`:"")+
    (worst?`<div class="kv"><span class="k">领跌</span><span class="v ${sgn(worst.v)}">${worst.s} ${fmtPct(worst.v)}</span></div>`:"");
}
function renderTable(){
  const sec=activeSector(); if(!sortBy[sec.id])sortBy[sec.id]={key:"today",dir:-1};
  const tb=$("#table"),sb=sortBy[sec.id],syms=visibleSyms(sec);
  $("#filterCount").textContent=`${syms.length} / ${sec.syms.length} 只`;
  const head="<thead><tr>"+COLS.map(c=>{ const ar=(sb&&sb.key===c.k)?`<span class="ar">${sb.dir>0?"▲":"▼"}</span>`:"";
    return `<th class="${c.l?'l':''}${c.c?'c':''}${c.nos?' nos':''}" data-k="${c.sort?c.k:''}">${c.t}${ar}</th>`; }).join("")+"</tr></thead>";
  let body="<tbody>";
  syms.forEach(s=>{ const t=today(s);
    body+=`<tr>`+
      `<td class="sym l">${esc(s)}</td>`+
      `<td class="name l">${esc(dispName(s))}</td>`+
      `<td class="c">${sparkSVG(MKT[s]&&MKT[s].c)}</td>`+
      `<td class="num">${fmtPrice(price(s))}</td>`+
      `<td><span class="pill ${sgn(t)}">${fmtPct(t)}</span></td>`+
      `<td class="num ${sgn(ret(s,'mtd'))}">${fmtPct(ret(s,'mtd'))}</td>`+
      `<td class="num ${sgn(ret(s,'q3m'))}">${fmtPct(ret(s,'q3m'))}</td>`+
      `<td class="num ${sgn(ret(s,'ytd'))}">${fmtPct(ret(s,'ytd'))}</td>`+
      `<td class="num flat">${fmtPE(peOf(s))}</td></tr>`; });
  body+=`</tbody>`;
  tb.innerHTML=head+body;
}
function renderUpdated(){ const el=$("#updated"), open=marketOpen(), age=QTS?Math.round((Date.now()-QTS)/60000):null;
  if(open&&(age==null||age>20)){ el.className="upd stale"; el.innerHTML=`⚠ 数据延迟${age!=null?` ${age} 分钟`:""}（最后更新 ${fmtDT(QTS)}）`; }
  else{ el.className="upd"; el.innerHTML=`更新时间 ${fmtDT(QTS)}${open?"":"（休市）"}`; } }
function setDot(s){ $("#dot").className="dot "+(s==="ok"?"ok":s==="err"?"err":""); }

/* ---------- 交互 ---------- */
$("#filterInput").addEventListener("input",e=>{ filter.q=e.target.value.trim(); renderTable(); });
document.querySelectorAll(".chip").forEach(c=>c.onclick=()=>{ filter.dir=c.dataset.dir; document.querySelectorAll(".chip").forEach(x=>x.classList.toggle("on",x===c)); renderTable(); });
$("#table").addEventListener("click",e=>{ const th=e.target.closest("th"); if(th&&th.dataset.k){ const sec=activeSector(),cur=sortBy[sec.id];
  sortBy[sec.id]=(cur&&cur.key===th.dataset.k)?{key:th.dataset.k,dir:-cur.dir}:{key:th.dataset.k,dir:th.dataset.k==="sym"?1:-1}; renderTable(); } });

/* ---------- 轮询（读服务器最新报价） ---------- */
function startPoll(){ if(poll)clearInterval(poll); poll=setInterval(()=>{ if(!document.hidden)loadQuotes(); },60000); }
document.addEventListener("visibilitychange",()=>{ if(!document.hidden)loadQuotes(); });

/* ---------- 启动 ---------- */
(async()=>{
  renderTabs();
  await loadStatic();
  renderTabs(); renderSummary(); renderTable();
  await loadQuotes();
  startPoll();
})();
</script>
</body>
</html>
