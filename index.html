<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Max Builds</title>
<style>
  :root{
    --bg0:#0a0e1a; --card:rgba(22,30,48,.66); --card-bd:rgba(120,140,180,.14);
    --txt:#e8edf6; --txt-dim:#8a96ad; --line:rgba(120,140,180,.10);
    --green:#27d796; --red:#ff5a6a; --flat:#8a96ad; --accent:#4c8dff; --warn:#ffb454;
    --mono:'SF Mono','JetBrains Mono','Consolas','Roboto Mono',ui-monospace,monospace;
  }
  *{box-sizing:border-box} html,body{margin:0;height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;color:var(--txt);min-height:100%;
    background:radial-gradient(1100px 700px at 12% -8%,rgba(76,141,255,.16),transparent 60%),
      radial-gradient(900px 600px at 96% 4%,rgba(39,215,150,.10),transparent 55%),
      radial-gradient(900px 800px at 60% 120%,rgba(120,80,255,.10),transparent 60%),
      linear-gradient(180deg,#0a0e1a,#0b1020 40%,#080b14);background-attachment:fixed}
  a{color:var(--accent);text-decoration:none}
  header{position:sticky;top:0;z-index:30;backdrop-filter:blur(14px);background:linear-gradient(180deg,rgba(10,14,26,.85),rgba(10,14,26,.6));border-bottom:1px solid var(--line)}
  .hrow{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:12px 22px;max-width:1360px;margin:0 auto}
  .brand{display:flex;align-items:center;gap:9px;font-weight:700;font-size:17px;white-space:nowrap}
  .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--flat)}
  .brand .dot.ok{background:var(--green);box-shadow:0 0 12px var(--green)}
  .brand .dot.load{background:var(--warn);box-shadow:0 0 12px var(--warn)}
  .brand .dot.err{background:var(--red);box-shadow:0 0 12px var(--red)}
  .idx{display:flex;gap:8px;flex-wrap:wrap}
  .idx .chip{display:flex;align-items:center;gap:7px;background:rgba(40,52,80,.45);border:1px solid var(--card-bd);border-radius:9px;padding:5px 10px;font-size:12.5px}
  .idx .chip .nm{color:var(--txt-dim)} .idx .chip .v{font-family:var(--mono);font-weight:600}
  .spacer{flex:1}
  .btn{display:inline-flex;align-items:center;gap:6px;cursor:pointer;user-select:none;border:1px solid var(--card-bd);background:rgba(40,52,80,.5);color:var(--txt);padding:7px 12px;border-radius:9px;font-size:13px;white-space:nowrap}
  .btn:hover{background:rgba(60,80,120,.6)} .btn.primary{background:var(--accent);border-color:transparent;color:#fff;font-weight:600} .btn.ghost{background:transparent}
  .tabwrap{max-width:1360px;margin:0 auto;padding:4px 14px 0}
  .tabs{display:flex;flex-wrap:wrap;gap:4px}
  .tab{display:inline-flex;align-items:center;gap:7px;cursor:pointer;padding:10px 15px;border:none;background:transparent;color:var(--txt-dim);font-size:14px;font-weight:600;border-bottom:2.5px solid transparent;border-radius:8px 8px 0 0}
  .tab:hover{color:var(--txt);background:rgba(120,140,180,.06)} .tab.on{color:var(--txt);border-bottom-color:var(--accent)}
  .tab .cnt{font-size:11px;color:var(--txt-dim);background:rgba(120,140,180,.14);padding:1px 7px;border-radius:20px;font-weight:600}
  .tab.on .cnt{background:rgba(76,141,255,.25);color:#cfe0ff} .tab.add{font-size:16px;color:var(--txt-dim);font-weight:400}
  main{max-width:1360px;margin:0 auto;padding:18px 18px 80px}
  .banner{margin:0 4px 16px;padding:12px 16px;border-radius:12px;font-size:13.5px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:rgba(255,180,84,.12);border:1px solid rgba(255,180,84,.4);color:#ffd9a0}
  .banner .btn{margin-left:auto}
  .onboard{margin:0 4px 18px;padding:22px 24px;border-radius:16px;background:var(--card);border:1px solid var(--card-bd);backdrop-filter:blur(8px)}
  .onboard .ob-title{font-size:18px;font-weight:700;margin-bottom:8px}
  .onboard .ob-text{color:var(--txt-dim);font-size:13.5px;line-height:1.65;margin-bottom:16px} .onboard .ob-text b{color:var(--txt)}
  .onboard ol{margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:12px}
  .onboard li{display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-size:14px}
  .onboard input{background:rgba(10,14,26,.55);border:1px solid var(--card-bd);color:var(--txt);padding:9px 12px;border-radius:9px;font-size:13px;font-family:var(--mono);width:280px}
  .onboard input:focus{outline:none;border-color:var(--accent)}
  .onboard .ob-safe{margin-top:14px;font-size:12px;color:var(--txt-dim)}
  .summary{display:flex;align-items:center;gap:18px;flex-wrap:wrap;margin:0 6px 14px;padding:14px 18px;background:var(--card);border:1px solid var(--card-bd);border-radius:14px;backdrop-filter:blur(8px)}
  .summary .big{font-size:20px;font-weight:700}
  .summary .kv{display:flex;flex-direction:column;gap:2px}
  .summary .kv .k{font-size:11px;color:var(--txt-dim);letter-spacing:.4px}
  .summary .kv .v{font-size:15px;font-weight:600;font-family:var(--mono)}
  .tablecard{margin:0 4px;background:var(--card);border:1px solid var(--card-bd);border-radius:16px;overflow:hidden;backdrop-filter:blur(8px)}
  .filterbar{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--line);flex-wrap:wrap}
  .filterbar input{background:rgba(10,14,26,.5);border:1px solid var(--card-bd);color:var(--txt);padding:8px 12px;border-radius:9px;font-size:13px;width:220px}
  .filterbar input:focus{outline:none;border-color:var(--accent)}
  .chips{display:flex;gap:4px}
  .chip{cursor:pointer;border:1px solid var(--card-bd);background:rgba(40,52,80,.4);color:var(--txt-dim);padding:6px 13px;border-radius:8px;font-size:12.5px}
  .chip:hover{color:var(--txt)} .chip.on{background:var(--accent);border-color:transparent;color:#fff;font-weight:600}
  .filterbar .muted{margin-left:auto;color:var(--txt-dim);font-size:12px}
  .tablescroll{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:14px;min-width:820px}
  thead th{text-align:right;font-weight:600;font-size:11.5px;letter-spacing:.4px;color:var(--txt-dim);text-transform:uppercase;padding:11px 14px;cursor:pointer;white-space:nowrap;user-select:none;border-bottom:1px solid var(--line);background:rgba(12,18,32,.4)}
  thead th:first-child,tbody td:first-child{text-align:left} thead th.l,tbody td.l{text-align:left} thead th.c,tbody td.c{text-align:center}
  thead th.nos{cursor:default} thead th:not(.nos):hover{color:var(--txt)} thead th .ar{opacity:.6;font-size:10px;margin-left:3px}
  tbody td{padding:11px 14px;text-align:right;border-bottom:1px solid var(--line);font-variant-numeric:tabular-nums;white-space:nowrap}
  tbody tr:last-child td{border-bottom:none} tbody tr:hover{background:rgba(120,140,180,.05)}
  .sym{font-weight:700;font-family:var(--mono);font-size:14px}
  .sym .x{visibility:hidden;color:var(--txt-dim);cursor:pointer;margin-right:8px;font-size:12px}
  tbody tr:hover .sym .x{visibility:visible} .sym .x:hover{color:var(--red)}
  td.name{color:var(--txt-dim);max-width:190px;overflow:hidden;text-overflow:ellipsis;font-size:13px}
  .spark{display:block;margin:0 auto}
  .num{font-family:var(--mono)} .pos{color:var(--green)} .neg{color:var(--red)} .flat{color:var(--flat)}
  .pill{display:inline-block;min-width:64px;padding:3px 9px;border-radius:7px;font-family:var(--mono);font-size:13px;font-weight:600}
  .pill.pos{background:rgba(39,215,150,.13)} .pill.neg{background:rgba(255,90,106,.13)} .pill.flat{background:rgba(138,150,173,.12)}
  .addrow td{padding:10px 14px}
  .addrow input{background:rgba(10,14,26,.5);border:1px solid var(--card-bd);color:var(--txt);padding:7px 11px;border-radius:8px;font-size:13px;width:200px;font-family:var(--mono);text-transform:uppercase}
  .addrow input:focus{outline:none;border-color:var(--accent)}
  .secttools{display:flex;gap:6px;align-items:center;padding:10px 16px;border-top:1px solid var(--line)}
  .iconbtn{cursor:pointer;color:var(--txt-dim);border:1px solid transparent;background:transparent;border-radius:7px;padding:5px 9px;font-size:12.5px}
  .iconbtn:hover{color:var(--txt);background:rgba(120,140,180,.12)} .iconbtn.danger:hover{color:var(--red);background:rgba(255,90,106,.12)}
  .modal-bg{position:fixed;inset:0;z-index:50;background:rgba(5,8,16,.66);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;padding:20px}
  .modal-bg.show{display:flex}
  .modal{width:440px;max-width:100%;background:#121a2c;border:1px solid var(--card-bd);border-radius:16px;padding:22px 24px;box-shadow:0 30px 80px rgba(0,0,0,.55)}
  .modal h2{margin:0 0 4px;font-size:18px} .modal p.sub{margin:0 0 18px;color:var(--txt-dim);font-size:13px}
  .field{margin-bottom:16px}
  .field label{display:flex;justify-content:space-between;font-size:12.5px;color:var(--txt-dim);margin-bottom:7px} .field label .ok{color:var(--green)}
  .field input{width:100%;background:rgba(10,14,26,.6);border:1px solid var(--card-bd);color:var(--txt);padding:10px 12px;border-radius:9px;font-size:14px;font-family:var(--mono)}
  .field input:focus{outline:none;border-color:var(--accent)} .field .hint{font-size:12px;color:var(--txt-dim);margin-top:6px}
  .modal-foot{display:flex;gap:10px;justify-content:flex-end;margin-top:22px}
  .legend{display:flex;gap:14px;flex-wrap:wrap;font-size:11.5px;color:var(--txt-dim);margin:14px 8px 0} .legend b{color:var(--txt)} .muted{color:var(--txt-dim)}
  /* ===== 主题（JS 切换；默认午夜蓝=原样） ===== */
  :root{--bg:radial-gradient(1100px 700px at 12% -8%,rgba(76,141,255,.16),transparent 60%),radial-gradient(900px 600px at 96% 4%,rgba(39,215,150,.10),transparent 55%),radial-gradient(900px 800px at 60% 120%,rgba(120,80,255,.10),transparent 60%),linear-gradient(180deg,#0a0e1a,#0b1020 40%,#080b14);--header:linear-gradient(180deg,rgba(10,14,26,.85),rgba(10,14,26,.6));--modal:#121a2c;--surf:rgba(255,255,255,.06);--hover:rgba(255,255,255,.05)}
  body{background:var(--bg);background-attachment:fixed}
  header{background:var(--header)} .modal{background:var(--modal)}
  .btn,.idx .chip,.chip,.filterbar input,.addrow input,.field input,.onboard input,thead th{background:var(--surf)}
  .btn:hover,tbody tr:hover,.tab:hover,.iconbtn:hover{background:var(--hover)} .btn:hover{border-color:var(--accent)}
  .pill.pos{background:color-mix(in srgb,var(--green) 16%,transparent)} .pill.neg{background:color-mix(in srgb,var(--red) 16%,transparent)}
  body.term{font-family:ui-monospace,'JetBrains Mono','Consolas',monospace}
  .themes{display:flex;flex-wrap:wrap;gap:7px}
  .sw{width:50px;height:34px;border-radius:9px;border:2px solid transparent;cursor:pointer;position:relative;padding:0;overflow:hidden}
  .sw.on{border-color:var(--accent);box-shadow:0 0 0 2px rgba(76,141,255,.3)}
  .sw .d{position:absolute;width:8px;height:8px;border-radius:50%;bottom:4px;box-shadow:0 0 0 1px rgba(0,0,0,.25)}
  .sw .d1{left:6px} .sw .d2{left:18px} .sw .d3{left:30px}
  .swname{font-size:12px;color:var(--txt-dim);margin-top:9px}
</style>
</head>
<body>
<header>
  <div class="hrow">
    <div class="brand"><span class="dot" id="dot"></span>Max Builds</div>
    <div class="idx" id="idx"></div>
    <div class="spacer"></div>
    <span class="muted" id="updated" style="font-size:12px"></span>
    <button class="btn ghost" id="settingsBtn">⚙</button>
  </div>
  <div class="tabwrap"><div class="tabs" id="tabs"></div></div>
</header>
<main>
  <div id="banner"></div>
  <div class="summary" id="summary" style="display:none"></div>
  <div class="tablecard">
    <div class="filterbar">
      <input id="filterInput" placeholder="🔍 筛选代码 / 名称…" autocomplete="off">
      <div class="chips"><button class="chip on" data-dir="all">全部</button><button class="chip" data-dir="up">上涨</button><button class="chip" data-dir="down">下跌</button></div>
      <span class="muted" id="filterCount"></span>
    </div>
    <div class="tablescroll"><table id="table"></table></div>
  </div>
</main>
<div class="modal-bg" id="modal">
  <div class="modal">
    <h2>设置</h2>
    <p class="sub">只保存在你这台设备的浏览器里，不会上传，网站源码里也没有。</p>
    <div class="field">
      <label>Finnhub API Key <span class="ok" id="keyOk"></span></label>
      <input type="password" id="keyInput" placeholder="粘贴 Finnhub key…" autocomplete="off" spellcheck="false">
      <div class="hint">没有就去 <a href="https://finnhub.io/register" target="_blank">finnhub.io/register</a> 免费拿（60次/分钟）。</div>
    </div>
    <div class="field"><label>自动刷新间隔（秒）</label><input type="number" id="intervalInput" min="10" step="5" value="60"></div>
    <div class="modal-foot"><button class="btn ghost" id="closeSettings">取消</button><button class="btn primary" id="saveSettings">保存</button></div>
  </div>
</div>
<script>
"use strict";
const LS={state:"sbx_state_v4",metric:s=>"sbx_m_"+s};
const INDICES=["SPY","QQQ","DIA"];
const FALLBACK_SECTORS=[{id:"mega",name:"七巨头+",syms:["AAPL","MSFT","GOOGL","AMZN","META","NVDA","TSLA"]}];
let UNI={cn:{},sectors:[]}, CN={}, MKT={}, MKTdate="";
let state=loadState(), qdata={}, meta={}, names={}, idxData={}, sortBy={}, filter={q:"",dir:"all"};
let timer=null, rateLimited=false, activeLoad=0;
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
const THEMES=[
 {id:"oled",name:"纯黑 OLED",modal:"#141416",v:{bg:"#000000",card:"#141416",cardBd:"rgba(255,255,255,.10)",line:"rgba(255,255,255,.07)",txt:"#f2f2f4",dim:"#8a8a92",acc:"#4c8dff",up:"#2ee6a0",dn:"#ff5a6a"}},
 {id:"graphite",name:"石墨灰",modal:"#20242b",v:{bg:"linear-gradient(180deg,#1b1e23,#121417)",card:"#20242b",cardBd:"rgba(255,255,255,.08)",line:"rgba(255,255,255,.06)",txt:"#e6e8ec",dim:"#8b929c",acc:"#6aa1ff",up:"#3ddc97",dn:"#ff6b7a"}},
 {id:"midnight",name:"午夜蓝",modal:"#121a2c",v:{bg:"radial-gradient(1100px 700px at 12% -8%,rgba(76,141,255,.16),transparent 60%),radial-gradient(900px 600px at 96% 4%,rgba(39,215,150,.10),transparent 55%),radial-gradient(900px 800px at 60% 120%,rgba(120,80,255,.10),transparent 60%),linear-gradient(180deg,#0a0e1a,#0b1020 40%,#080b14)",card:"rgba(22,30,48,.66)",cardBd:"rgba(120,140,180,.14)",line:"rgba(120,140,180,.10)",txt:"#e8edf6",dim:"#8a96ad",acc:"#4c8dff",up:"#27d796",dn:"#ff5a6a"}},
 {id:"purple",name:"深空紫",modal:"#1a1230",v:{bg:"radial-gradient(800px 480px at 82% -10%,rgba(150,90,255,.22),transparent 60%),linear-gradient(180deg,#120c20,#0a0712)",card:"rgba(32,24,52,.72)",cardBd:"rgba(170,140,255,.16)",line:"rgba(170,140,255,.10)",txt:"#efeaff",dim:"#9a8fb5",acc:"#a880ff",up:"#36e0a8",dn:"#ff6a8a"}},
 {id:"emerald",name:"墨绿",modal:"#0e1f17",v:{bg:"radial-gradient(800px 480px at 82% -10%,rgba(40,200,150,.15),transparent 60%),linear-gradient(180deg,#0a1712,#06100b)",card:"rgba(16,34,26,.74)",cardBd:"rgba(80,200,150,.14)",line:"rgba(80,200,150,.09)",txt:"#e6f2ea",dim:"#86a596",acc:"#22d0a0",up:"#5cf0a6",dn:"#ff7a6a"}},
 {id:"mocha",name:"暖棕摩卡",modal:"#241a10",v:{bg:"radial-gradient(800px 480px at 82% -10%,rgba(224,160,96,.16),transparent 60%),linear-gradient(180deg,#17110b,#0f0a06)",card:"rgba(42,32,22,.78)",cardBd:"rgba(200,160,110,.14)",line:"rgba(200,160,110,.09)",txt:"#f1e8dc",dim:"#b29a82",acc:"#e0a35e",up:"#5cc98a",dn:"#ff7a6a"}},
 {id:"light",name:"浅色白天",light:true,modal:"#ffffff",v:{bg:"linear-gradient(180deg,#f5f7fb,#eaeef4)",card:"#ffffff",cardBd:"rgba(20,30,50,.12)",line:"rgba(20,30,50,.08)",txt:"#1a2233",dim:"#6b7688",acc:"#2563eb",up:"#16a34a",dn:"#dc2626"}},
 {id:"cream",name:"米白纸感",light:true,modal:"#fffdf8",v:{bg:"linear-gradient(180deg,#f5f1e8,#ece5d8)",card:"#fffdf8",cardBd:"rgba(60,50,30,.14)",line:"rgba(60,50,30,.09)",txt:"#2a2620",dim:"#8a8170",acc:"#b4530b",up:"#15803d",dn:"#b91c1c"}},
 {id:"neon",name:"赛博霓虹",modal:"#120a1e",v:{bg:"radial-gradient(650px 380px at 14% -10%,rgba(0,229,255,.18),transparent 55%),radial-gradient(650px 380px at 86% 0,rgba(255,45,142,.16),transparent 55%),#08010f",card:"rgba(18,10,30,.76)",cardBd:"rgba(0,229,255,.18)",line:"rgba(0,229,255,.10)",txt:"#eafdff",dim:"#7d8aa0",acc:"#00e5ff",up:"#2ee66a",dn:"#ff2d6e"}},
 {id:"terminal",name:"终端琥珀",modal:"#0a0a0a",v:{bg:"#000000",card:"#0a0a0a",cardBd:"rgba(255,176,0,.22)",line:"rgba(255,176,0,.12)",txt:"#d8dde0",dim:"#7a8a7e",acc:"#ffb000",up:"#00d26a",dn:"#ff3b3b"}},
];
function applyTheme(id){
  const t=THEMES.find(x=>x.id===id)||THEMES[2], r=document.documentElement.style, v=t.v, dk=!t.light;
  const set={"--bg":v.bg,"--card":v.card,"--card-bd":v.cardBd,"--line":v.line,"--txt":v.txt,"--txt-dim":v.dim,"--flat":v.dim,
    "--accent":v.acc,"--green":v.up,"--red":v.dn,"--modal":t.modal,
    "--header":dk?"linear-gradient(180deg,rgba(8,10,16,.82),rgba(8,10,16,.5))":"linear-gradient(180deg,rgba(255,255,255,.88),rgba(255,255,255,.62))",
    "--surf":dk?"rgba(255,255,255,.06)":"rgba(0,0,0,.05)","--hover":dk?"rgba(255,255,255,.05)":"rgba(0,0,0,.04)"};
  for(const k in set) r.setProperty(k,set[k]);
  document.body.classList.toggle("term",id==="terminal"); document.body.classList.toggle("light",!!t.light);
}
function buildThemes(){
  $("#themeGrid").innerHTML=THEMES.map(t=>`<button class="sw ${state.settings.theme===t.id?'on':''}" data-id="${t.id}" title="${t.name}" style="background:${t.v.bg}"><span class="d d1" style="background:${t.v.acc}"></span><span class="d d2" style="background:${t.v.up}"></span><span class="d d3" style="background:${t.v.dn}"></span></button>`).join("");
  const c=THEMES.find(x=>x.id===state.settings.theme); $("#swName").textContent="当前："+(c?c.name:"—");
}

function loadState(){
  let s=null; try{ s=JSON.parse(localStorage.getItem(LS.state)); }catch(e){}
  if(!s) s={};
  s.settings=Object.assign({key:"",intervalSec:60,activeId:"mega",theme:"midnight"},s.settings||{});
  if(!s.settings.key){ for(const old of ["sbx_state_v3","sbx_state_v2","sb_state_v1"]){ try{ const o=JSON.parse(localStorage.getItem(old)); if(o&&o.settings&&o.settings.key){s.settings.key=o.settings.key;break;} }catch(e){} } }
  if(!Array.isArray(s.sectors)) s.sectors=[];
  return s;
}
function saveState(){ localStorage.setItem(LS.state,JSON.stringify(state)); }
const $=(s,r=document)=>r.querySelector(s);
const todayStr=()=>{const d=new Date();return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();};
function activeSector(){ return state.sectors.find(x=>x.id===state.settings.activeId)||state.sectors[0]||{id:"_",name:"—",syms:[]}; }
const fmtPct=v=>v==null||isNaN(v)?"—":(v>=0?"+":"")+v.toFixed(2)+"%";
const fmtPrice=v=>v==null||isNaN(v)||v===0?"—":v.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtPE=v=>v==null||isNaN(v)?"—":v<0?"亏损":v.toFixed(1);
const sgn=v=>v==null||isNaN(v)||v===0?"flat":v>0?"pos":"neg";
const esc=s=>String(s).replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]));
function dispName(s){ return CN[s]||(MKT[s]&&MKT[s].n)||names[s]||""; }
function ret(s,k){ const m=MKT[s]; if(m&&m[k]!=null) return m[k]; const p=meta[s]; return p&&p[k]!=null?p[k]:null; }
function pe(s){ return meta[s]?meta[s].pe:null; }
function sparkOf(s){ return MKT[s]&&MKT[s].c; }

/* ---------- 静态数据（同源，稳）---------- */
async function loadData(){
  const bust="?d="+todayStr();
  const [u,m]=await Promise.all([
    fetch("data/universe.json"+bust).then(r=>r.json()).catch(()=>null),
    fetch("data/market.json"+bust).then(r=>r.json()).catch(()=>null),
  ]);
  if(u){ UNI=u; CN=u.cn||{};
    if(!state.sectors.length || state.uniVer!==u.ver){ state.sectors=JSON.parse(JSON.stringify(u.sectors)); state.uniVer=u.ver; if(!state.sectors.find(x=>x.id===state.settings.activeId)) state.settings.activeId=state.sectors[0].id; saveState(); } }
  else if(!state.sectors.length){ state.sectors=JSON.parse(JSON.stringify(FALLBACK_SECTORS)); }
  if(m){ MKT=m.data||{}; MKTdate=m.updated||""; }
}

/* ---------- Finnhub（仅实时报价 + 后台补 PE）---------- */
async function fh(path){
  const key=state.settings.key; if(!key) throw new Error("NO_KEY");
  const r=await fetch("https://finnhub.io/api/v1"+path+(path.includes("?")?"&":"?")+"token="+encodeURIComponent(key));
  if(r.status===429){const e=new Error("RATE");e.rate=true;throw e;}
  if(r.status===401||r.status===403){const e=new Error("AUTH");e.auth=true;throw e;}
  if(!r.ok) throw new Error("HTTP "+r.status);
  return r.json();
}
function pick(o,ks){ for(const k of ks){ if(o&&o[k]!=null&&!isNaN(o[k]))return o[k]; } return null; }
async function loadQuote(s){ const q=await fh("/quote?symbol="+encodeURIComponent(s));
  if(q&&(q.c||q.pc)) qdata[s]={price:q.c,today:q.dp}; else qdata[s]={price:null,today:null,err:1}; }
function cachedMetric(s){ try{const o=JSON.parse(localStorage.getItem(LS.metric(s)));return(o&&o.d===todayStr())?o.v:null;}catch(e){return null;} }
async function loadMeta(s){
  let m=cachedMetric(s);
  if(!m){ const r=await fh("/stock/metric?metric=all&symbol="+encodeURIComponent(s)); m=(r&&r.metric)?r.metric:{}; localStorage.setItem(LS.metric(s),JSON.stringify({d:todayStr(),v:m})); }
  meta[s]={pe:pick(m,["peTTM","peBasicExclExtraTTM","peNormalizedAnnual","peExclExtraTTM","peAnnual"]),
    ytd:pick(m,["yearToDatePriceReturnDaily"]),mtd:pick(m,["monthToDatePriceReturnDaily"]),q3m:pick(m,["13WeekPriceReturnDaily"])};
}
async function pool(items,worker,conc=5){ let i=0; async function run(){ while(i<items.length){ const x=items[i++]; try{ await worker(x); }catch(e){ if(e.rate)rateLimited=true; if(e.auth)throw e; } } } await Promise.all(Array.from({length:Math.min(conc,items.length||1)},run)); }

async function loadSector(sec){
  if(!state.settings.key){ renderAll(); return; }
  const my=++activeLoad; rateLimited=false; setDot("load");
  try{ await pool(sec.syms, loadQuote, 5); state.settings._ts=Date.now(); setDot(rateLimited?"err":"ok"); }
  catch(e){ setDot("err"); }
  if(my===activeLoad){ renderSummary(); renderTable(); renderUpdated(); }
  bgMeta(sec.syms, my);
}
async function bgMeta(syms, my){       // 温柔补 PE（+ market 缺失时补涨跌幅/名称）
  for(const s of syms){
    if(my!==activeLoad) return;
    const needPE=!meta[s]||meta[s].pe==null;
    const needRet=!MKT[s]&&(!meta[s]||meta[s].ytd==null);
    const needName=!CN[s]&&!(MKT[s]&&MKT[s].n)&&!names[s];
    if(needPE||needRet){ try{ await loadMeta(s); renderTable(); }catch(e){ if(e.rate||e.auth) return; } }
    if(needName){ try{ const p=await fh("/stock/profile2?symbol="+encodeURIComponent(s)); if(p&&p.name){names[s]=p.name;renderTable();} }catch(e){} }
    await sleep(140);
  }
}
async function loadIndices(){ if(!state.settings.key)return; for(const s of INDICES){ try{const q=await fh("/quote?symbol="+s);idxData[s]={today:q.dp};}catch(e){} } renderIndices(); }

/* ---------- 趋势图 ---------- */
function sparkSVG(c){
  if(!c||c.length<2) return '<span class="flat" style="font-family:var(--mono)">···</span>';
  const w=92,h=26,mn=Math.min(...c),mx=Math.max(...c),rg=(mx-mn)||1;
  const pts=c.map((v,i)=>((i/(c.length-1))*(w-2)+1).toFixed(1)+","+(h-2-((v-mn)/rg)*(h-4)).toFixed(1)).join(" ");
  const col=c[c.length-1]>=c[0]?"var(--green)":"var(--red)";
  return `<svg class="spark" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><polyline points="${pts}" fill="none" stroke="${col}" stroke-width="1.5" stroke-linejoin="round"/></svg>`;
}

/* ---------- 渲染 ---------- */
const COLS=[{k:"sym",t:"代码",l:1,sort:1},{k:"name",t:"名称",l:1,nos:1},{k:"spark",t:"趋势",c:1,nos:1},
 {k:"price",t:"价格",sort:1},{k:"today",t:"今日",sort:1},{k:"mtd",t:"本月",sort:1},{k:"q3m",t:"近90天",sort:1},{k:"ytd",t:"YTD",sort:1},{k:"pe",t:"PE",sort:1}];
function rowVal(s,k){ if(k==="sym")return s; if(k==="price"||k==="today")return(qdata[s]||{})[k]; if(k==="pe")return pe(s); if(k==="mtd"||k==="q3m"||k==="ytd")return ret(s,k); return null; }
function visibleSyms(sec){
  let a=sec.syms.slice();
  if(filter.q){ const q=filter.q.toUpperCase(); a=a.filter(s=>s.includes(q)||dispName(s).toUpperCase().includes(q)); }
  if(filter.dir!=="all"){ a=a.filter(s=>{ const t=(qdata[s]||{}).today; if(t==null||isNaN(t))return false; return filter.dir==="up"?t>0:t<0; }); }
  const sb=sortBy[sec.id];
  if(sb&&sb.key){ a.sort((x,y)=>{ let vx=rowVal(x,sb.key),vy=rowVal(y,sb.key);
    if(sb.key==="sym")return sb.dir*String(vx).localeCompare(String(vy));
    const nx=(vx==null||isNaN(vx)),ny=(vy==null||isNaN(vy)); if(nx&&ny)return 0; if(nx)return 1; if(ny)return -1; return sb.dir*(vx-vy); }); }
  return a;
}
function renderTabs(){
  const box=$("#tabs"); box.innerHTML="";
  state.sectors.forEach(sec=>{ const b=document.createElement("button"); b.className="tab"+(sec.id===state.settings.activeId?" on":"");
    b.innerHTML=`${esc(sec.name)} <span class="cnt">${sec.syms.length}</span>`;
    b.onclick=()=>{ state.settings.activeId=sec.id; saveState(); renderAll(); loadSector(sec); }; box.appendChild(b); });
}
function renderIndices(){ const box=$("#idx"); box.innerHTML="";
  INDICES.forEach(s=>{ const d=idxData[s]||{}; box.insertAdjacentHTML("beforeend",`<div class="chip"><span class="nm">${CN[s]||s}</span><span class="v ${sgn(d.today)}">${fmtPct(d.today)}</span></div>`); }); }
function renderSummary(){
  const sec=activeSector(),el=$("#summary");
  const vals=sec.syms.map(s=>(qdata[s]||{}).today).filter(v=>v!=null&&!isNaN(v));
  if(!vals.length){ el.style.display="none"; return; } el.style.display="flex";
  const up=vals.filter(v=>v>0).length,down=vals.filter(v=>v<0).length,avg=vals.reduce((a,b)=>a+b,0)/vals.length;
  let best=null,worst=null; sec.syms.forEach(s=>{const v=(qdata[s]||{}).today;if(v==null||isNaN(v))return;if(!best||v>best.v)best={s,v};if(!worst||v<worst.v)worst={s,v};});
  el.innerHTML=`<div class="big">${esc(sec.name)}</div>`+
    `<div class="kv"><span class="k">今日</span><span class="v"><span class="pos">${up}涨</span> / <span class="neg">${down}跌</span></span></div>`+
    `<div class="kv"><span class="k">板块均涨幅</span><span class="v ${sgn(avg)}">${fmtPct(avg)}</span></div>`+
    (best?`<div class="kv"><span class="k">领涨</span><span class="v ${sgn(best.v)}">${best.s} ${fmtPct(best.v)}</span></div>`:"")+
    (worst?`<div class="kv"><span class="k">领跌</span><span class="v ${sgn(worst.v)}">${worst.s} ${fmtPct(worst.v)}</span></div>`:"");
}
function renderTable(){
  const sec=activeSector(),tb=$("#table"),sb=sortBy[sec.id],syms=visibleSyms(sec);
  $("#filterCount").textContent=`${syms.length} / ${sec.syms.length} 只`;
  const head="<thead><tr>"+COLS.map(c=>{ const ar=(sb&&sb.key===c.k)?`<span class="ar">${sb.dir>0?"▲":"▼"}</span>`:"";
    return `<th class="${c.l?'l':''}${c.c?'c':''}${c.nos?' nos':''}" data-k="${c.sort?c.k:''}">${c.t}${ar}</th>`; }).join("")+"</tr></thead>";
  let body="<tbody>";
  syms.forEach(s=>{ const q=qdata[s]||{};
    body+=`<tr>`+
      `<td class="sym l"><span class="x" data-del="${esc(s)}" title="移除">✕</span>${esc(s)}</td>`+
      `<td class="name l">${esc(dispName(s))}</td>`+
      `<td class="c">${sparkSVG(sparkOf(s))}</td>`+
      `<td class="num">${q.err?'<span class="neg">无效</span>':fmtPrice(q.price)}</td>`+
      `<td><span class="pill ${sgn(q.today)}">${fmtPct(q.today)}</span></td>`+
      `<td class="num ${sgn(ret(s,'mtd'))}">${fmtPct(ret(s,'mtd'))}</td>`+
      `<td class="num ${sgn(ret(s,'q3m'))}">${fmtPct(ret(s,'q3m'))}</td>`+
      `<td class="num ${sgn(ret(s,'ytd'))}">${fmtPct(ret(s,'ytd'))}</td>`+
      `<td class="num flat">${fmtPE(pe(s))}</td></tr>`; });
  body+=`</tbody>`;
  tb.innerHTML=head+body;
}
function renderTools(){}
function renderBanner(){ const b=$("#banner");
  if(!state.settings.key){
    b.innerHTML=`<div class="onboard">
      <div class="ob-title">👋 欢迎使用 Max Builds</div>
      <div class="ob-text">看<b>实时</b>美股报价需要一个 <b>免费的 Finnhub Key</b>（60 次/分钟，个人用足够）。趋势图和涨跌幅是现成的，填了 key 就有实时价格。</div>
      <ol>
        <li><a class="btn primary" href="https://finnhub.io/register" target="_blank">① 免费注册拿 Key（约 30 秒）↗</a></li>
        <li>② 粘贴到这里：<input id="obKey" placeholder="粘贴 Finnhub key…" autocomplete="off" spellcheck="false"> <button class="btn primary" id="obGo">开始 →</button></li>
      </ol>
      <div class="ob-safe">🔒 你的 key 只保存在<b>你这台设备的浏览器</b>里，不会上传、不进网站源码，别人看不到。</div>
    </div>`;
    const go=()=>{ const k=$("#obKey").value.trim(); if(!k)return; state.settings.key=k; saveState(); setupTimer(); renderAll(); loadIndices(); loadSector(activeSector()); };
    $("#obGo").onclick=go; $("#obKey").addEventListener("keydown",e=>{ if(e.key==="Enter") go(); });
  } else b.innerHTML=""; }
function fmtDT(ts){ if(!ts)return"—"; const d=new Date(ts),p=n=>String(n).padStart(2,"0");
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`; }
function renderUpdated(){ $("#updated").innerHTML=state.settings.key?`${rateLimited?'<span style="color:var(--warn)">限流· </span>':''}更新时间 ${fmtDT(state.settings._ts)}`:""; }
function renderAll(){ renderTabs(); renderTools(); renderBanner(); renderSummary(); renderTable(); renderUpdated(); }
function setDot(s){ $("#dot").className="dot "+(s==="ok"?"ok":s==="load"?"load":s==="err"?"err":""); renderUpdated(); }

/* ---------- 交互 ---------- */
function openSettings(){ $("#keyInput").value=state.settings.key||""; $("#intervalInput").value=state.settings.intervalSec||60; $("#keyOk").textContent=state.settings.key?"✓ 已配置":""; $("#modal").classList.add("show"); }
function closeSettings(){ $("#modal").classList.remove("show"); }
$("#settingsBtn").onclick=openSettings; $("#closeSettings").onclick=closeSettings; $("#modal").onclick=e=>{if(e.target.id==="modal")closeSettings();};
$("#saveSettings").onclick=()=>{ state.settings.key=$("#keyInput").value.trim(); state.settings.intervalSec=Math.max(10,parseInt($("#intervalInput").value)||60);
  saveState(); closeSettings(); setupTimer(); renderAll(); if(state.settings.key){ loadIndices(); loadSector(activeSector()); } };
$("#filterInput").addEventListener("input",e=>{ filter.q=e.target.value.trim(); renderTable(); });
document.querySelectorAll(".chip").forEach(c=>c.onclick=()=>{ filter.dir=c.dataset.dir; document.querySelectorAll(".chip").forEach(x=>x.classList.toggle("on",x===c)); renderTable(); });
$("#table").addEventListener("click",e=>{
  const del=e.target.getAttribute&&e.target.getAttribute("data-del");
  if(del){ const sec=activeSector(); sec.syms=sec.syms.filter(x=>x!==del); saveState(); renderTabs(); renderTools(); renderSummary(); renderTable(); return; }
  const th=e.target.closest("th"); if(th&&th.dataset.k){ const sec=activeSector(),cur=sortBy[sec.id];
    sortBy[sec.id]=(cur&&cur.key===th.dataset.k)?{key:th.dataset.k,dir:-cur.dir}:{key:th.dataset.k,dir:th.dataset.k==="sym"?1:-1}; renderTable(); } });
$("#table").addEventListener("keydown",e=>{ if(e.target.id==="addSym"&&e.key==="Enter"){ const s=e.target.value.trim().toUpperCase().replace(/[^A-Z0-9.\-]/g,""); e.target.value="";
  if(!s)return; const sec=activeSector(); if(!sec.syms.includes(s)){ sec.syms.push(s); saveState(); renderTabs(); renderTools(); renderTable();
    if(state.settings.key){ loadQuote(s).then(()=>{renderSummary();renderTable();bgMeta([s],activeLoad);}).catch(()=>renderTable()); } } } });

/* ---------- 自动刷新（常开）---------- */
function setupTimer(){ if(timer)clearInterval(timer); if(!state.settings.key)return;
  timer=setInterval(()=>{ if(!document.hidden){ loadIndices(); loadSector(activeSector()); } },(state.settings.intervalSec||60)*1000); }
document.addEventListener("visibilitychange",()=>{ if(!document.hidden&&state.settings.key){ loadIndices(); loadSector(activeSector()); } });

/* ---------- 启动 ---------- */
(async()=>{
  renderAll();
  await loadData();
  renderAll();
  if(state.settings.key){ loadIndices(); loadSector(activeSector()); setupTimer(); }
})();
</script>
